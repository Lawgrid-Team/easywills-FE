<section class="help-page font-sans">
  <!-- Top actions -->
  <div class="help-page__top">
    <button type="button" class="btn-back" (click)="goBack()">
      <span class="btn-back__chev" aria-hidden="true">‹</span>
      <span>Back to Help Centre</span>
    </button>
  </div>

  <!-- Header -->
  <header class="help-header">
    <div class="help-icon-circle" aria-hidden="true">
      <!-- Shield icon -->
      <svg class="help-icon" viewBox="0 0 24 24" fill="none">
        <path
          d="M12 2l8 4v6c0 5-3.4 9.4-8 10-4.6-.6-8-5-8-10V6l8-4Z"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
        />
        <path
          d="M12 7v10"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          opacity="0.0"
        />
      </svg>
    </div>

    <h1 class="help-title">Data Security</h1>

    <p class="help-desc">
      Initiate the signing process to activate bank-grade encryption, ensuring your data's
      confidentiality and integrity.
    </p>
  </header>
</section>
