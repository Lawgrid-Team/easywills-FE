<section class="help-page font-sans">
  <!-- Top actions -->
  <div class="help-page__top">
    <button type="button" class="btn-back" (click)="goBack()">
      <span class="btn-back__chev" aria-hidden="true">‹</span>
      <span>Back to Help Centre</span>
    </button>
  </div>

  <!-- Header (stacked: icon above title) -->
  <header class="help-page__header">
    <div class="icon-circle" aria-hidden="true">
  <!-- pencil/edit icon -->
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path
      d="M12 20h9"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
    />
    <path
      d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
</div>

    <div class="help-page__content">
      <h1 class="help-page__title">Will Creation</h1>

      <div class="help-page__steps">
        <div class="step">
          <div class="step__line">
            <span class="step__label">Step 1:</span>
            <span class="step__text">Click on <strong>Get started</strong></span>
          </div>
          <div class="step__desc">
            Fill all the necessary information on every wizards steps
          </div>
        </div>

        <div class="step">
          <div class="step__line">
            <span class="step__label">Step 2:</span>
            <span class="step__text">Sign and Validate or Download</span>
          </div>
          <div class="step__desc">
            Click on the sign and validate will to complete will process or download Pdf
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Screenshots -->
  <div class="help-page__media">
    <figure class="media-card">
      <img
        class="media-card__img"
        [src]="images.getStarted"
        alt="EasyWills signup screen showing account creation form"
        loading="lazy"
      />
    </figure>
    <br>

    <figure class="media-card">
      <img
        class="media-card__img"
        [src]="images.signValidate"
        alt="EasyWills onboarding step 1 personal details screen"
        loading="lazy"
      />
    </figure>
    <br>
    <br>
    <br>
    <br>
  </div>
</section>
