<section class="help-page font-sans">
  <!-- Top actions -->
  <div class="help-page__top">
    <button type="button" class="btn-back" (click)="goBack()">
      <span class="btn-back__chev" aria-hidden="true">‹</span>
      <span>Back to Help Centre</span>
    </button>
  </div>

  <!-- Header -->
  <header class="help-page__header--stack">
    <!-- Single circle icon badge -->
    <div class="icon-badge icon-badge--single" aria-hidden="true">
      <!-- receipt/plan icon -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path
          d="M7 3h10a2 2 0 0 1 2 2v16l-2-1-2 1-2-1-2 1-2-1-2 1-2-1V5a2 2 0 0 1 2-2Z"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path d="M9 7h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        <path d="M9 11h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        <path d="M9 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
    </div>

    <div class="help-page__content">
      <h1 class="help-page__title">Plan Upgrade</h1>

      <div class="help-page__steps">
        <p class="step">
          <span class="step__label">Step 1:</span>
          Click on sign and validate will
        </p>

        <p class="step">
          <span class="step__label">Step 2:</span>
          Select plan and make payment
        </p>
      </div>
    </div>
  </header>

  <!-- Screenshots -->
  <div class="help-page__media">
    <figure class="media-card">
      <img
        class="media-card__img"
        [src]="images.signValidate"
        alt="Will created screen showing Sign and validate will action"
        loading="lazy"
      />
    </figure>

    <figure class="media-card">
      <img
        class="media-card__img"
        [src]="images.planSelection"
        alt="Upgrade your free plan screen showing plan options"
        loading="lazy"
      />
    </figure>
    <br>
    <br>
    <br>
    <br>
  </div>
</section>
