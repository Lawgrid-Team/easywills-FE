<header class="w-full bg-white">
  <div class="border-b border-b-gray-300">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between py-4">
        <div class="flex items-center">
            <a [routerLink]="['/']" class="inline-flex items-center" aria-label="Go to home">
                <img
                    src="svg/easywill_logo.svg"
                    alt="EasyWill Logo"
                    class="h-8 sm:h-9 w-auto cursor-pointer"
                />
            </a>
        </div>

        <!-- Desktop actions -->
        <div class="hidden md:flex items-center gap-x-4">
          <button mat-stroked-button [routerLink]="['/auth/login']">Login</button>
          <button mat-flat-button [routerLink]="['/auth/signup']">Write your will</button>
        </div>

        <!-- Mobile hamburger -->
        <button
          type="button"
          class="md:hidden inline-flex items-center justify-center p-2 rounded border border-gray-200"
          (click)="toggleMenu()"
          [attr.aria-expanded]="isMenuOpen"
          aria-label="Toggle menu"
        >
          <span class="text-xl leading-none">☰</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Desktop nav row -->
  <div class="hidden md:block border-b border-b-gray-300">
    <nav class="container mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between py-4">
      <ul class="flex items-center gap-x-8 text-base/7 text-gray-400">
        <li class="hover:text-gray-500">
          <a [routerLink]="['/']" fragment="how-it-works" class="hover:text-gray-500">
            How it Works
          </a>
        </li>
        <li class="hover:text-gray-500">
          <a [routerLink]="['/pricing']" routerLinkActive="router-link-active" class="hover:text-gray-500">
            Pricing
          </a>
        </li>
        <li class="hover:text-gray-500">
          <a [routerLink]="['/help']" routerLinkActive="router-link-active" class="hover:text-gray-500">
            Help Centre
          </a>
        </li>
      </ul>

      <ul class="flex items-center gap-x-4 text-base/7 text-gray-400">
        <li class="hover:text-gray-500">
          <a href="#" class="hover:text-gray-500">Digital Vault</a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Mobile menu panel -->
  <div *ngIf="isMenuOpen" class="md:hidden border-b border-b-gray-300 bg-white">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <!-- Links -->
      <nav class="flex flex-col gap-3 text-gray-700">
        <a
          class="py-2"
          [routerLink]="['/']"
          fragment="how-it-works"
          (click)="closeMenu()"
        >
          How it Works
        </a>

        <a
          class="py-2"
          [routerLink]="['/pricing']"
          (click)="closeMenu()"
        >
          Pricing
        </a>

        <a
          class="py-2"
          [routerLink]="['/help']"
          (click)="closeMenu()"
        >
          Help Centre
        </a>

        <a class="py-2" href="#" (click)="closeMenu()">
          Digital Vault
        </a>
      </nav>

      <!-- Mobile actions -->
      <div class="mt-4 flex flex-col gap-3">
        <button mat-stroked-button [routerLink]="['/auth/login']" (click)="closeMenu()">
          Login
        </button>

        <button mat-flat-button [routerLink]="['/auth/signup']" (click)="closeMenu()">
          Write your will
        </button>
      </div>
    </div>
  </div>
</header>
